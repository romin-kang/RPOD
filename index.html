<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPOD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="ipod">

    <div class="screen-bezel">
      <div class="screen">
        <div class="screen-content" id="screenContent"></div>
      </div>
    </div>

    <div class="wheel-area">
      <div class="click-wheel" id="clickWheel">
        <div class="wheel-label top"    id="btnMenu">MENU</div>
        <div class="wheel-label left"   id="btnPrev">⏮</div>
        <div class="wheel-label right"  id="btnNext">⏭</div>
        <div class="wheel-label bottom" id="btnPlayPause">▶⏸</div>
        <div class="center-btn"         id="btnCenter"></div>
      </div>
    </div>

  </div>

  <audio id="audioPlayer"></audio>
  <script src="script.js"></script>
</body>
</html>
